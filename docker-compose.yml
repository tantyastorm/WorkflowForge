services:
  postgres:
    image: postgres:17.6-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflowforge}
      POSTGRES_USER: ${POSTGRES_USER:-workflowforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workflowforge_dev}
    ports:
      - "${WORKFLOWFORGE_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8.2.1-bookworm
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${WORKFLOWFORGE_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-workflowforge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-workflowforge_dev_secret}
    ports:
      - "${WORKFLOWFORGE_MINIO_API_HOST_PORT:-9000}:9000"
      - "${WORKFLOWFORGE_MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      WORKFLOWFORGE_S3_ENDPOINT_URL: ${WORKFLOWFORGE_S3_ENDPOINT_URL:-http://minio:9000}
      WORKFLOWFORGE_S3_ACCESS_KEY: ${WORKFLOWFORGE_S3_ACCESS_KEY:-workflowforge}
      WORKFLOWFORGE_S3_SECRET_KEY: ${WORKFLOWFORGE_S3_SECRET_KEY:-workflowforge_dev_secret}
      WORKFLOWFORGE_S3_BUCKET: ${WORKFLOWFORGE_S3_BUCKET:-workflowforge}
    volumes:
      - ./infrastructure/minio/init.sh:/usr/local/bin/workflowforge-minio-init.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/workflowforge-minio-init.sh"]
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    image: workflowforge-api:local
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      WORKFLOWFORGE_APP_NAME: ${WORKFLOWFORGE_APP_NAME:-WorkflowForge}
      WORKFLOWFORGE_ENVIRONMENT: ${WORKFLOWFORGE_ENVIRONMENT:-development}
      WORKFLOWFORGE_DEBUG: ${WORKFLOWFORGE_DEBUG:-true}
      WORKFLOWFORGE_LOG_LEVEL: ${WORKFLOWFORGE_LOG_LEVEL:-INFO}
      WORKFLOWFORGE_LOG_FORMAT: ${WORKFLOWFORGE_LOG_FORMAT:-console}
      WORKFLOWFORGE_DATABASE_HOST: postgres
      WORKFLOWFORGE_DATABASE_PORT: 5432
      WORKFLOWFORGE_DATABASE_NAME: ${WORKFLOWFORGE_DATABASE_NAME:-workflowforge}
      WORKFLOWFORGE_DATABASE_USER: ${WORKFLOWFORGE_DATABASE_USER:-workflowforge}
      WORKFLOWFORGE_DATABASE_PASSWORD: ${WORKFLOWFORGE_DATABASE_PASSWORD:-workflowforge_dev}
      WORKFLOWFORGE_DATABASE_ECHO: ${WORKFLOWFORGE_DATABASE_ECHO:-false}
      WORKFLOWFORGE_DATABASE_POOL_SIZE: ${WORKFLOWFORGE_DATABASE_POOL_SIZE:-5}
      WORKFLOWFORGE_DATABASE_MAX_OVERFLOW: ${WORKFLOWFORGE_DATABASE_MAX_OVERFLOW:-10}
      WORKFLOWFORGE_DATABASE_POOL_TIMEOUT_SECONDS: ${WORKFLOWFORGE_DATABASE_POOL_TIMEOUT_SECONDS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    image: workflowforge-api:local
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "workflowforge_api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    environment:
      WORKFLOWFORGE_APP_NAME: ${WORKFLOWFORGE_APP_NAME:-WorkflowForge}
      WORKFLOWFORGE_ENVIRONMENT: ${WORKFLOWFORGE_ENVIRONMENT:-development}
      WORKFLOWFORGE_DEBUG: ${WORKFLOWFORGE_DEBUG:-true}
      WORKFLOWFORGE_LOG_LEVEL: ${WORKFLOWFORGE_LOG_LEVEL:-INFO}
      WORKFLOWFORGE_LOG_FORMAT: ${WORKFLOWFORGE_LOG_FORMAT:-console}
      WORKFLOWFORGE_API_HOST: 0.0.0.0
      WORKFLOWFORGE_API_PORT: 8000
      WORKFLOWFORGE_API_V1_PREFIX: ${WORKFLOWFORGE_API_V1_PREFIX:-/api/v1}
      WORKFLOWFORGE_API_DOCS_ENABLED: ${WORKFLOWFORGE_API_DOCS_ENABLED:-true}
      WORKFLOWFORGE_CORS_ORIGINS: ${WORKFLOWFORGE_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      WORKFLOWFORGE_DATABASE_HOST: postgres
      WORKFLOWFORGE_DATABASE_PORT: 5432
      WORKFLOWFORGE_DATABASE_NAME: ${WORKFLOWFORGE_DATABASE_NAME:-workflowforge}
      WORKFLOWFORGE_DATABASE_USER: ${WORKFLOWFORGE_DATABASE_USER:-workflowforge}
      WORKFLOWFORGE_DATABASE_PASSWORD: ${WORKFLOWFORGE_DATABASE_PASSWORD:-workflowforge_dev}
      WORKFLOWFORGE_DATABASE_ECHO: ${WORKFLOWFORGE_DATABASE_ECHO:-false}
      WORKFLOWFORGE_DATABASE_POOL_SIZE: ${WORKFLOWFORGE_DATABASE_POOL_SIZE:-5}
      WORKFLOWFORGE_DATABASE_MAX_OVERFLOW: ${WORKFLOWFORGE_DATABASE_MAX_OVERFLOW:-10}
      WORKFLOWFORGE_DATABASE_POOL_TIMEOUT_SECONDS: ${WORKFLOWFORGE_DATABASE_POOL_TIMEOUT_SECONDS:-30}
      WORKFLOWFORGE_REDIS_HOST: redis
      WORKFLOWFORGE_REDIS_PORT: 6379
      WORKFLOWFORGE_REDIS_DB: ${WORKFLOWFORGE_REDIS_DB:-0}
      WORKFLOWFORGE_REDIS_PASSWORD: ${WORKFLOWFORGE_REDIS_PASSWORD:-}
      WORKFLOWFORGE_REDIS_SSL: ${WORKFLOWFORGE_REDIS_SSL:-false}
      WORKFLOWFORGE_REDIS_SOCKET_TIMEOUT_SECONDS: ${WORKFLOWFORGE_REDIS_SOCKET_TIMEOUT_SECONDS:-3}
      WORKFLOWFORGE_CELERY_BROKER_URL: ${WORKFLOWFORGE_CELERY_BROKER_URL:-}
      WORKFLOWFORGE_CELERY_RESULT_BACKEND: ${WORKFLOWFORGE_CELERY_RESULT_BACKEND:-}
      WORKFLOWFORGE_CELERY_BROKER_DATABASE: ${WORKFLOWFORGE_CELERY_BROKER_DATABASE:-1}
      WORKFLOWFORGE_CELERY_RESULT_BACKEND_DATABASE: ${WORKFLOWFORGE_CELERY_RESULT_BACKEND_DATABASE:-2}
      WORKFLOWFORGE_CELERY_DEFAULT_QUEUE: ${WORKFLOWFORGE_CELERY_DEFAULT_QUEUE:-workflowforge}
      WORKFLOWFORGE_CELERY_DIAGNOSTIC_QUEUE: ${WORKFLOWFORGE_CELERY_DIAGNOSTIC_QUEUE:-workflowforge.diagnostics}
      WORKFLOWFORGE_CELERY_TASK_TIME_LIMIT_SECONDS: ${WORKFLOWFORGE_CELERY_TASK_TIME_LIMIT_SECONDS:-300}
      WORKFLOWFORGE_CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: ${WORKFLOWFORGE_CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-270}
      WORKFLOWFORGE_CELERY_WORKER_CONCURRENCY: ${WORKFLOWFORGE_CELERY_WORKER_CONCURRENCY:-2}
      WORKFLOWFORGE_CELERY_WORKER_HEALTH_TIMEOUT_SECONDS: ${WORKFLOWFORGE_CELERY_WORKER_HEALTH_TIMEOUT_SECONDS:-3}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_INTERVAL_SECONDS:-30}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_TTL_SECONDS: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_TTL_SECONDS:-90}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_KEY: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_KEY:-workflowforge:diagnostics:scheduler:last_seen}
      WORKFLOWFORGE_S3_ENDPOINT_URL: ${WORKFLOWFORGE_S3_ENDPOINT_URL:-http://minio:9000}
      WORKFLOWFORGE_S3_ACCESS_KEY: ${WORKFLOWFORGE_S3_ACCESS_KEY:-workflowforge}
      WORKFLOWFORGE_S3_SECRET_KEY: ${WORKFLOWFORGE_S3_SECRET_KEY:-workflowforge_dev_secret}
      WORKFLOWFORGE_S3_BUCKET: ${WORKFLOWFORGE_S3_BUCKET:-workflowforge}
      WORKFLOWFORGE_S3_REGION: ${WORKFLOWFORGE_S3_REGION:-us-east-1}
      WORKFLOWFORGE_S3_USE_SSL: ${WORKFLOWFORGE_S3_USE_SSL:-false}
      WORKFLOWFORGE_S3_TIMEOUT_SECONDS: ${WORKFLOWFORGE_S3_TIMEOUT_SECONDS:-3}
    ports:
      - "${WORKFLOWFORGE_API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    image: workflowforge-api:local
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "workflowforge_worker.main:app",
        "worker",
        "--loglevel=INFO",
        "--queues",
        "${WORKFLOWFORGE_CELERY_DEFAULT_QUEUE:-workflowforge},${WORKFLOWFORGE_CELERY_DIAGNOSTIC_QUEUE:-workflowforge.diagnostics}",
        "--concurrency",
        "${WORKFLOWFORGE_CELERY_WORKER_CONCURRENCY:-2}",
      ]
    environment:
      WORKFLOWFORGE_APP_NAME: ${WORKFLOWFORGE_APP_NAME:-WorkflowForge}
      WORKFLOWFORGE_ENVIRONMENT: ${WORKFLOWFORGE_ENVIRONMENT:-development}
      WORKFLOWFORGE_DEBUG: ${WORKFLOWFORGE_DEBUG:-true}
      WORKFLOWFORGE_LOG_LEVEL: ${WORKFLOWFORGE_LOG_LEVEL:-INFO}
      WORKFLOWFORGE_LOG_FORMAT: ${WORKFLOWFORGE_LOG_FORMAT:-console}
      WORKFLOWFORGE_REDIS_HOST: redis
      WORKFLOWFORGE_REDIS_PORT: 6379
      WORKFLOWFORGE_REDIS_DB: ${WORKFLOWFORGE_REDIS_DB:-0}
      WORKFLOWFORGE_REDIS_PASSWORD: ${WORKFLOWFORGE_REDIS_PASSWORD:-}
      WORKFLOWFORGE_REDIS_SSL: ${WORKFLOWFORGE_REDIS_SSL:-false}
      WORKFLOWFORGE_REDIS_SOCKET_TIMEOUT_SECONDS: ${WORKFLOWFORGE_REDIS_SOCKET_TIMEOUT_SECONDS:-3}
      WORKFLOWFORGE_CELERY_BROKER_URL: ${WORKFLOWFORGE_CELERY_BROKER_URL:-}
      WORKFLOWFORGE_CELERY_RESULT_BACKEND: ${WORKFLOWFORGE_CELERY_RESULT_BACKEND:-}
      WORKFLOWFORGE_CELERY_BROKER_DATABASE: ${WORKFLOWFORGE_CELERY_BROKER_DATABASE:-1}
      WORKFLOWFORGE_CELERY_RESULT_BACKEND_DATABASE: ${WORKFLOWFORGE_CELERY_RESULT_BACKEND_DATABASE:-2}
      WORKFLOWFORGE_CELERY_DEFAULT_QUEUE: ${WORKFLOWFORGE_CELERY_DEFAULT_QUEUE:-workflowforge}
      WORKFLOWFORGE_CELERY_DIAGNOSTIC_QUEUE: ${WORKFLOWFORGE_CELERY_DIAGNOSTIC_QUEUE:-workflowforge.diagnostics}
      WORKFLOWFORGE_CELERY_TASK_TIME_LIMIT_SECONDS: ${WORKFLOWFORGE_CELERY_TASK_TIME_LIMIT_SECONDS:-300}
      WORKFLOWFORGE_CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: ${WORKFLOWFORGE_CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-270}
      WORKFLOWFORGE_CELERY_WORKER_CONCURRENCY: ${WORKFLOWFORGE_CELERY_WORKER_CONCURRENCY:-2}
      WORKFLOWFORGE_CELERY_WORKER_HEALTH_TIMEOUT_SECONDS: ${WORKFLOWFORGE_CELERY_WORKER_HEALTH_TIMEOUT_SECONDS:-3}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_INTERVAL_SECONDS:-30}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_TTL_SECONDS: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_TTL_SECONDS:-90}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_KEY: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_KEY:-workflowforge:diagnostics:scheduler:last_seen}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run celery -A workflowforge_worker.main:app inspect ping --timeout=2 | grep -q pong",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    image: workflowforge-api:local
    command:
      [
        "uv",
        "run",
        "celery",
        "-A",
        "workflowforge_scheduler.main:app",
        "beat",
        "--loglevel=INFO",
        "--schedule",
        "/tmp/workflowforge-celerybeat-schedule",
      ]
    environment:
      WORKFLOWFORGE_APP_NAME: ${WORKFLOWFORGE_APP_NAME:-WorkflowForge}
      WORKFLOWFORGE_ENVIRONMENT: ${WORKFLOWFORGE_ENVIRONMENT:-development}
      WORKFLOWFORGE_DEBUG: ${WORKFLOWFORGE_DEBUG:-true}
      WORKFLOWFORGE_LOG_LEVEL: ${WORKFLOWFORGE_LOG_LEVEL:-INFO}
      WORKFLOWFORGE_LOG_FORMAT: ${WORKFLOWFORGE_LOG_FORMAT:-console}
      WORKFLOWFORGE_REDIS_HOST: redis
      WORKFLOWFORGE_REDIS_PORT: 6379
      WORKFLOWFORGE_REDIS_DB: ${WORKFLOWFORGE_REDIS_DB:-0}
      WORKFLOWFORGE_REDIS_PASSWORD: ${WORKFLOWFORGE_REDIS_PASSWORD:-}
      WORKFLOWFORGE_REDIS_SSL: ${WORKFLOWFORGE_REDIS_SSL:-false}
      WORKFLOWFORGE_REDIS_SOCKET_TIMEOUT_SECONDS: ${WORKFLOWFORGE_REDIS_SOCKET_TIMEOUT_SECONDS:-3}
      WORKFLOWFORGE_CELERY_BROKER_URL: ${WORKFLOWFORGE_CELERY_BROKER_URL:-}
      WORKFLOWFORGE_CELERY_RESULT_BACKEND: ${WORKFLOWFORGE_CELERY_RESULT_BACKEND:-}
      WORKFLOWFORGE_CELERY_BROKER_DATABASE: ${WORKFLOWFORGE_CELERY_BROKER_DATABASE:-1}
      WORKFLOWFORGE_CELERY_RESULT_BACKEND_DATABASE: ${WORKFLOWFORGE_CELERY_RESULT_BACKEND_DATABASE:-2}
      WORKFLOWFORGE_CELERY_DEFAULT_QUEUE: ${WORKFLOWFORGE_CELERY_DEFAULT_QUEUE:-workflowforge}
      WORKFLOWFORGE_CELERY_DIAGNOSTIC_QUEUE: ${WORKFLOWFORGE_CELERY_DIAGNOSTIC_QUEUE:-workflowforge.diagnostics}
      WORKFLOWFORGE_CELERY_TASK_TIME_LIMIT_SECONDS: ${WORKFLOWFORGE_CELERY_TASK_TIME_LIMIT_SECONDS:-300}
      WORKFLOWFORGE_CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: ${WORKFLOWFORGE_CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-270}
      WORKFLOWFORGE_CELERY_WORKER_CONCURRENCY: ${WORKFLOWFORGE_CELERY_WORKER_CONCURRENCY:-2}
      WORKFLOWFORGE_CELERY_WORKER_HEALTH_TIMEOUT_SECONDS: ${WORKFLOWFORGE_CELERY_WORKER_HEALTH_TIMEOUT_SECONDS:-3}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_INTERVAL_SECONDS: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_INTERVAL_SECONDS:-30}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_TTL_SECONDS: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_TTL_SECONDS:-90}
      WORKFLOWFORGE_SCHEDULER_HEARTBEAT_KEY: ${WORKFLOWFORGE_SCHEDULER_HEARTBEAT_KEY:-workflowforge:diagnostics:scheduler:last_seen}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import os, redis; password=os.environ.get('WORKFLOWFORGE_REDIS_PASSWORD') or None; client=redis.Redis(host=os.environ['WORKFLOWFORGE_REDIS_HOST'], port=int(os.environ['WORKFLOWFORGE_REDIS_PORT']), db=int(os.environ['WORKFLOWFORGE_REDIS_DB']), password=password, decode_responses=True); raise SystemExit(0 if client.get(os.environ['WORKFLOWFORGE_SCHEDULER_HEARTBEAT_KEY']) else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  web:
    image: node:24.11.1-bookworm-slim
    working_dir: /workspace/apps/web
    command:
      [
        "sh",
        "-lc",
        "corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm dev --host 0.0.0.0 --port 5173",
      ]
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_CSRF_COOKIE_NAME: ${VITE_CSRF_COOKIE_NAME:-workflowforge_csrf}
      VITE_CSRF_HEADER_NAME: ${VITE_CSRF_HEADER_NAME:-X-CSRF-Token}
    ports:
      - "${WORKFLOWFORGE_WEB_HOST_PORT:-5173}:5173"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  web_node_modules:
