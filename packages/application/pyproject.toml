[project]
name = "workflowforge-application"
version = "0.1.0a1"
description = "WorkflowForge application use-case package."
requires-python = ">=3.12,<3.13"
dependencies = [
  "workflowforge-contracts",
  "workflowforge-domain",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workflowforge_application"]
