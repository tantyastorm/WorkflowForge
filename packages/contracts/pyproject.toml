[project]
name = "workflowforge-contracts"
version = "0.1.0a1"
description = "WorkflowForge stable transport-neutral contracts package."
requires-python = ">=3.12,<3.13"
dependencies = [
  "pydantic>=2.12.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workflowforge_contracts"]
