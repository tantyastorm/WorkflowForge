[project]
name = "workflowforge-infrastructure"
version = "0.1.0a1"
description = "WorkflowForge infrastructure adapter foundation package."
requires-python = ">=3.12,<3.13"
dependencies = [
  "alembic>=1.17.0",
  "asyncpg>=0.30.0",
  "pydantic-settings>=2.11.0",
  "psycopg[binary]>=3.2.0",
  "sqlalchemy[asyncio]>=2.0.0",
  "structlog>=25.4.0",
  "workflowforge-application",
  "workflowforge-contracts",
  "workflowforge-domain",
  "redis>=8.0.1",
  "boto3>=1.43.51",
  "celery[redis]>=5.3.1",
  "argon2-cffi>=25.1.0",
  "pyjwt>=2.10.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workflowforge_infrastructure"]
