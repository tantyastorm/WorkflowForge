[project]
name = "workflowforge-infrastructure"
version = "0.1.0a1"
description = "WorkflowForge infrastructure adapter foundation package."
requires-python = ">=3.12,<3.13"
dependencies = [
  "pydantic-settings>=2.11.0",
  "structlog>=25.4.0",
  "workflowforge-contracts",
  "workflowforge-domain",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workflowforge_infrastructure"]
