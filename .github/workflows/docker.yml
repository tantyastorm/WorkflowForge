name: Docker Validation

on:
  pull_request:
    paths:
      - ".env.example"
      - ".github/workflows/docker.yml"
      - "apps/api/**"
      - "apps/scheduler/**"
      - "apps/worker/**"
      - "docker-compose.yml"
      - "infrastructure/**"
      - "migrations/**"
      - "packages/**"
      - "pyproject.toml"
      - "scripts/**"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".env.example"
      - ".github/workflows/docker.yml"
      - "apps/api/**"
      - "apps/scheduler/**"
      - "apps/worker/**"
      - "docker-compose.yml"
      - "infrastructure/**"
      - "migrations/**"
      - "packages/**"
      - "pyproject.toml"
      - "scripts/**"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    name: Compose Configuration And Image Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose Configuration
        run: docker compose config

      - name: Build Shared Backend Image
        run: docker compose build api

      - name: Explain Shared Image Coverage
        run: |
          echo "The api, worker, scheduler, and migrate services all use infrastructure/docker/api.Dockerfile."
          echo "Building the api service validates the shared WorkflowForge backend image used by those services."
